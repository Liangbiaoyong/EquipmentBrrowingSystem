server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 支持 Vue History 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端容器
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── MinIO 直连（生产环境，绕过后端代理） ───
    # 当 MinIO 通过 docker-compose 暴露端口或独立部署时启用此配置
    # 取消下面注释并设置正确的 MinIO 地址即可直连
    #
    # location /minio/ {
    #     proxy_pass http://minio:9000/device-borrow/;
    #     proxy_set_header Host $host;
    #     # 静态资源缓存
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }

    # 如果 MinIO 直连未启用，前端仍可通过 /api/v1/files/ 走后端代理
    # 此处将 /files/ 路径也代理到后端（开发/过渡方案）
    location /api/v1/files/ {
        proxy_pass http://backend:8080/api/v1/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 缓存：设备图片1年，其他1天（由后端响应头控制）
        proxy_cache_valid 200 1d;
    }
}
