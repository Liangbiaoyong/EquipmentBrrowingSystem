server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  redis:
    host: ${REDIS_HOST}
    port: 6379
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: device-borrow
  image-max-width: 1920
  image-quality: 0.7
  image-max-size: 1048576

jwt:
  secret: ${JWT_SECRET}
  expiration: 14400000  # 4小时

borrow:
  max-days: 7

# CAS 统一认证配置（生产环境通过环境变量注入）
cas:
  userinfo-url: ${CAS_USERINFO_URL:https://libbooking.gzhu.edu.cn/ic-web/auth/userInfo}
  auth-address-url: ${CAS_AUTH_ADDRESS_URL:}
  request-timeout: ${CAS_REQUEST_TIMEOUT:15000}
  server-url: ${CAS_SERVER_URL:https://newcas.gzhu.edu.cn/cas}
  cli-path: ${CAS_CLI_PATH:TEMP}
  cli-timeout: ${CAS_CLI_TIMEOUT:60}

knife4j:
  enable: true
  production: true
