server:
  port: 8080
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  messages:
    encoding: UTF-8
  datasource:
    url: jdbc:mysql://localhost:3306/device_borrow?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: devuser
    password: devpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  redis:
    host: localhost
    port: 6379
    timeout: 5000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: device-borrow
  image-max-width: 1920
  image-quality: 0.8
  image-max-size: 5242880

jwt:
  secret: local-test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha512
  expiration: 14400000  # 4小时

# 借用规则（默认值，Admin可运行时通过 /admin/config 覆盖）
borrow:
  max-days: 7   # 最大借用天数

# CAS 统一认证配置
# 说明：本系统不直接对接CAS协议，而是利用CAS登录后获得的token
# 前端完成CAS认证后，将token传给后端 /auth/cas/login
# 后端调用以下 userInfo API 验证token并获取用户信息
cas:
  # CAS用户信息验证API（广州大学图书馆认证中心）
  userinfo-url: https://libbooking.gzhu.edu.cn/ic-web/auth/userInfo
  # CAS引导地址（auth/address API，用于发现正确的登录URL；不填则自动从userinfo-url推导）
  auth-address-url:
  # 调用userInfo API的超时时间（毫秒）
  request-timeout: 15000
  # CAS服务端地址
  server-url: https://newcas.gzhu.edu.cn/cas
  # Dev模式：token以"local:"开头时跳过CAS API，直接用用户名查本地库
  dev-mode: true

knife4j:
  enable: true
  production: false
